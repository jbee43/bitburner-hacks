name: CI

on:
  push:
    branches: [main]
# Least-privilege default: workflows only need to read repo contents.
# Override per-job for any step that mutates repo state via GITHUB_TOKEN.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: Lint and audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Audit
        run: npm audit --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

