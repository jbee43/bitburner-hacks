name: Security

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GH_RATELIMIT_PAT: ${{ secrets.GH_RATELIMIT_PAT }}

# Least-privilege default: workflows only need to read repo contents.
# Override per-job for any step that mutates repo state via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --omit=dev

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache Trivy vulnerability DB
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-v0
          restore-keys: |
            ${{ runner.os }}-trivy-db-
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar xz -C /usr/local/bin trivy
      - name: Scan filesystem (trivy)
        run: trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --exit-code 1 .

  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          case "$(uname -m)" in
            aarch64) GL_ARCH="linux_arm64" ;;
            x86_64)  GL_ARCH="linux_x64" ;;
            *) echo "::error::Unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          auth_args=()
          if [ -n "${GH_RATELIMIT_PAT:-}" ]; then
            auth_args+=(-H "Authorization: Bearer $GH_RATELIMIT_PAT")
          fi
          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            "${auth_args[@]}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${GL_ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

